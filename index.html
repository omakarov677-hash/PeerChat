<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VoiceChat — Мессенджер с музыкой</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0e1621;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #17212b;
            border-radius: 28px;
            width: 1100px;
            max-width: 95vw;
            height: 90vh;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .sidebar {
            width: 300px;
            background: #1f2c38;
            border-right: 1px solid #2b3b47;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .logo {
            color: white;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2b3b47;
        }
        .user-card {
            background: #17212b;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid #2b3b47;
        }
        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2c7be5, #1e5bc0);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        .user-name { font-size: 18px; font-weight: 600; color: white; margin-top: 10px; }
        .online-dot { width: 8px; height: 8px; background: #2c7be5; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .id-box {
            background: #0e1621;
            border-radius: 12px;
            padding: 12px;
            margin-top: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #2c7be5;
            word-break: break-all;
            text-align: center;
        }
        .input-field {
            background: #0e1621;
            border: 1px solid #2b3b47;
            border-radius: 12px;
            padding: 12px;
            color: white;
            width: 100%;
            outline: none;
            margin-bottom: 12px;
        }
        .btn {
            background: #2c7be5;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-secondary { background: #2b3b47; }
        .status {
            padding: 10px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
        }
        .status.connected { background: #1e5b3c; color: #8bcb9e; }
        .status.disconnected { background: #5b2e2e; color: #ff9e9e; }
        .status.calling { background: #5b4a2e; color: #ffd966; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            padding: 16px 20px;
            background: #17212b;
            border-bottom: 1px solid #2b3b47;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 { color: white; font-size: 18px; }
        .call-buttons { display: flex; gap: 12px; }
        .call-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #6c8695;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .call-btn:hover { color: white; background: #2b3b47; }
        .call-btn.active { background: #e53935; color: white; animation: pulseCall 1s infinite; }
        @keyframes pulseCall { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            display: flex;
            max-width: 70%;
            animation: fadeIn 0.2s;
        }
        .message.outgoing { align-self: flex-end; }
        .message.incoming { align-self: flex-start; }
        .bubble {
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }
        .outgoing .bubble { background: #2c7be5; color: white; border-bottom-right-radius: 4px; }
        .incoming .bubble { background: #2b3b47; color: white; border-bottom-left-radius: 4px; }
        .message-time { font-size: 10px; color: #8e9eae; margin-top: 4px; text-align: right; }
        .call-message {
            text-align: center;
            padding: 8px;
            margin: 5px 0;
            background: #2b3b47;
            border-radius: 20px;
            font-size: 12px;
            color: #8e9eae;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #2b3b47;
            display: flex;
            gap: 10px;
            position: relative;
        }
        .message-input {
            flex: 1;
            background: #2b3b47;
            border: none;
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .send-btn {
            background: #2c7be5;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .sticker-panel {
            background: #17212b;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            position: absolute;
            bottom: 80px;
            right: 25px;
            width: 260px;
            border: 1px solid #2b3b47;
            z-index: 10;
        }
        .sticker { font-size: 36px; cursor: pointer; transition: transform 0.1s; padding: 4px; }
        .sticker:hover { transform: scale(1.2); background: #2b3b47; border-radius: 12px; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="logo"><i class="fab fa-telegram"></i> VoiceChat</div>
        <div class="user-card">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div class="user-name" id="currentUserName">...</div>
            <div style="font-size: 12px; color: #8e9eae;"><span class="online-dot"></span> Онлайн</div>
        </div>
        <div>
            <div style="color:#8e9eae; margin-bottom: 8px;"><i class="fas fa-qrcode"></i> ВАШ ID</div>
            <div class="id-box" id="myIdDisplay">Генерация...</div>
            <button class="btn btn-secondary" id="copyIdBtn" style="margin-top: 8px;"><i class="fas fa-copy"></i> Копировать ID</button>
        </div>
        <div>
            <div style="color:#8e9eae; margin-bottom: 8px;"><i class="fas fa-user-plus"></i> ПОДКЛЮЧИТЬСЯ</div>
            <input type="text" class="input-field" id="remoteIdInput" placeholder="Введите ID друга">
            <button class="btn" id="connectBtn"><i class="fas fa-plug"></i> Подключиться</button>
            <div id="connectionStatus" class="status disconnected">⚫ Не подключен</div>
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">
            <h3><i class="fas fa-comments"></i> <span id="connectedUserName">Никто не подключен</span></h3>
            <div class="call-buttons">
                <button class="call-btn" id="voiceCallBtn" title="Голосовой звонок"><i class="fas fa-phone-alt"></i></button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align:center; color:#6c8695; padding:40px;">
                <i class="fas fa-comment-dots" style="font-size: 48px; opacity: 0.5;"></i><br>
                Скопируйте свой ID и отправьте другу
            </div>
        </div>
        <div class="input-area">
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение...">
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            <div style="margin-left: 10px;">
                <button id="stickerBtn" style="background:none; border:none; color:#6c8695; font-size:22px; cursor:pointer;"><i class="fas fa-smile"></i></button>
            </div>
            <div id="stickerPanel" class="sticker-panel hidden">
                <div class="sticker">😀</div><div class="sticker">😂</div><div class="sticker">🥰</div>
                <div class="sticker">😎</div><div class="sticker">🔥</div><div class="sticker">🎉</div>
                <div class="sticker">❤️</div><div class="sticker">👍</div><div class="sticker">🚀</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== МЕССЕНДЖЕР С РИНГТОНОМ ==========
    let peer = null;
    let currentConn = null;
    let currentCall = null;
    let localStream = null;
    let isConnected = false;
    let remotePeerId = null;
    let myId = null;
    let isInCall = false;

    // РИНГТОН: Можно заменить ссылку на свою
    const ringtone = new Audio('https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Ketsa/Raising_Frequency/Ketsa_-_08_-_Intergalactic.mp3');
    ringtone.loop = true;

    myId = 'user_' + Math.random().toString(36).substring(2, 10);
    document.getElementById('myIdDisplay').innerText = myId;
    document.getElementById('currentUserName').innerText = myId;

    function initPeer() {
        peer = new Peer(myId, {
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (id) => addSystemMessage('✅ Ваш ID готов!'));

        peer.on('connection', (conn) => {
            if (currentConn) { conn.close(); return; }
            setupConnection(conn);
        });

        // ВХОДЯЩИЙ ЗВОНОК
        peer.on('call', (call) => {
            if (currentCall) { call.close(); return; }
            
            ringtone.play().catch(e => console.log("Браузер заблокировал звук до клика"));
            
            const acceptCall = confirm(`📞 Входящий звонок! Принять?`);
            if (acceptCall) {
                ringtone.pause();
                ringtone.currentTime = 0;
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    localStream = stream;
                    call.answer(stream);
                    setupVoiceCall(call);
                    updateCallUI(true);
                });
            } else {
                ringtone.pause();
                ringtone.currentTime = 0;
                call.close();
            }
        });
    }

    function setupConnection(conn) {
        currentConn = conn;
        remotePeerId = conn.peer;
        isConnected = true;
        document.getElementById('connectionStatus').className = 'status connected';
        document.getElementById('connectionStatus').innerHTML = '🟢 Подключен';
        document.getElementById('connectedUserName').innerText = 'Собеседник: ' + conn.peer;

        conn.on('data', (data) => {
            if (data.type === 'message') addMessageToChat(data.text, 'incoming', data.time);
            if (data.type === 'sticker') addMessageToChat(data.sticker, 'incoming', data.time, true);
            if (data.type === 'call_end') endCall();
        });
        conn.on('close', () => disconnectChat());
    }

    function makeVoiceCall() {
        if (!isConnected) return alert('Сначала подключитесь!');
        if (isInCall) { endCall(); return; }

        ringtone.play().catch(e => console.log("Ошибка звука"));
        addSystemMessage('📞 Вызов...');
        
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            localStream = stream;
            const call = peer.call(remotePeerId, stream);
            setupVoiceCall(call);
            updateCallUI(true);
        });
    }

    function setupVoiceCall(call) {
        currentCall = call;
        isInCall = true;
        call.on('stream', (stream) => {
            ringtone.pause(); // Остановить музыку, когда ответили
            ringtone.currentTime = 0;
            const audio = new Audio();
            audio.srcObject = stream;
            audio.play();
            call.remoteAudio = audio;
        });
        call.on('close', () => endCall());
    }

    function endCall() {
        ringtone.pause();
        ringtone.currentTime = 0;
        if (currentCall) currentCall.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        isInCall = false;
        updateCallUI(false);
        if (currentConn) currentConn.send({ type: 'call_end' });
        addSystemMessage('📞 Звонок завершен');
    }

    function updateCallUI(active) {
        const btn = document.getElementById('voiceCallBtn');
        btn.classList.toggle('active', active);
        btn.innerHTML = active ? '<i class="fas fa-phone-slash"></i>' : '<i class="fas fa-phone-alt"></i>';
    }

    function addMessageToChat(content, type, time, isSticker = false) {
        const container = document.getElementById('messagesArea');
        if (container.querySelector('div[style*="text-align:center"]')) container.innerHTML = '';
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.innerHTML = `<div><div class="bubble">${isSticker ? '<span style="font-size:40px">'+content+'</span>' : content}</div><div class="message-time">${time}</div></div>`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    function addSystemMessage(text) {
        const container = document.getElementById('messagesArea');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'call-message';
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input.value.trim() || !isConnected) return;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        currentConn.send({ type: 'message', text: input.value, time: time });
        addMessageToChat(input.value, 'outgoing', time);
        input.value = '';
    }

    function disconnectChat() {
        isConnected = false;
        document.getElementById('connectionStatus').className = 'status disconnected';
        document.getElementById('connectedUserName').innerText = 'Никто не подключен';
    }

    document.getElementById('copyIdBtn').onclick = () => {
        navigator.clipboard.writeText(myId);
        alert('ID скопирован!');
    };
    document.getElementById('connectBtn').onclick = () => {
        const id = document.getElementById('remoteIdInput').value;
        const conn = peer.connect(id);
        conn.on('open', () => setupConnection(conn));
    };
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').onkeypress = (e) => e.key === 'Enter' && sendMessage();
    document.getElementById('voiceCallBtn').onclick = makeVoiceCall;
    document.getElementById('stickerBtn').onclick = () => document.getElementById('stickerPanel').classList.toggle('hidden');
    
    document.querySelectorAll('.sticker').forEach(s => {
        s.onclick = () => {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            currentConn.send({ type: 'sticker', sticker: s.innerText, time: time });
            addMessageToChat(s.innerText, 'outgoing', time, true);
            document.getElementById('stickerPanel').classList.add('hidden');
        };
    });

    initPeer();
</script>
</body>
</html>
