<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VoiceChat — Мессенджер с голосовыми звонками</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0e1621;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #17212b;
            border-radius: 28px;
            width: 1100px;
            max-width: 95vw;
            height: 90vh;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .sidebar {
            width: 300px;
            background: #1f2c38;
            border-right: 1px solid #2b3b47;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .logo {
            color: white;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2b3b47;
        }
        .user-card {
            background: #17212b;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid #2b3b47;
        }
        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2c7be5, #1e5bc0);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        .user-name { font-size: 18px; font-weight: 600; color: white; margin-top: 10px; }
        .online-dot { width: 8px; height: 8px; background: #2c7be5; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .id-box {
            background: #0e1621;
            border-radius: 12px;
            padding: 12px;
            margin-top: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #2c7be5;
            word-break: break-all;
            text-align: center;
        }
        .input-field {
            background: #0e1621;
            border: 1px solid #2b3b47;
            border-radius: 12px;
            padding: 12px;
            color: white;
            width: 100%;
            outline: none;
            margin-bottom: 12px;
        }
        .btn {
            background: #2c7be5;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-secondary { background: #2b3b47; }
        .btn-danger { background: #e53935; }
        .status {
            padding: 10px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
        }
        .status.connected { background: #1e5b3c; color: #8bcb9e; }
        .status.disconnected { background: #5b2e2e; color: #ff9e9e; }
        .status.calling { background: #5b4a2e; color: #ffd966; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            padding: 16px 20px;
            background: #17212b;
            border-bottom: 1px solid #2b3b47;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 { color: white; font-size: 18px; }
        .call-buttons { display: flex; gap: 12px; }
        .call-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #6c8695;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .call-btn:hover { color: white; background: #2b3b47; }
        .call-btn.active { background: #e53935; color: white; animation: pulseCall 1s infinite; }
        @keyframes pulseCall { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            display: flex;
            max-width: 70%;
            animation: fadeIn 0.2s;
        }
        .message.outgoing { align-self: flex-end; }
        .message.incoming { align-self: flex-start; }
        .bubble {
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }
        .outgoing .bubble { background: #2c7be5; color: white; border-bottom-right-radius: 4px; }
        .incoming .bubble { background: #2b3b47; color: white; border-bottom-left-radius: 4px; }
        .message-time { font-size: 10px; color: #8e9eae; margin-top: 4px; text-align: right; }
        .call-message {
            text-align: center;
            padding: 8px;
            margin: 5px 0;
            background: #2b3b47;
            border-radius: 20px;
            font-size: 12px;
            color: #8e9eae;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #2b3b47;
            display: flex;
            gap: 10px;
            position: relative;
        }
        .message-input {
            flex: 1;
            background: #2b3b47;
            border: none;
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .send-btn {
            background: #2c7be5;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .tools {
            position: absolute;
            bottom: 85px;
            right: 25px;
            display: flex;
            gap: 12px;
        }
        .tools button {
            background: none;
            border: none;
            color: #6c8695;
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
        }
        .sticker-panel {
            background: #17212b;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            position: absolute;
            bottom: 130px;
            right: 25px;
            width: 260px;
            border: 1px solid #2b3b47;
        }
        .sticker { font-size: 36px; cursor: pointer; transition: transform 0.1s; padding: 4px; }
        .sticker:hover { transform: scale(1.2); background: #2b3b47; border-radius: 12px; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .help-text { font-size: 12px; color: #8e9eae; margin-top: 12px; text-align: center; line-height: 1.5; }
        .in-call-badge {
            background: #e53935;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="logo"><i class="fab fa-telegram"></i> VoiceChat</div>
        
        <div class="user-card">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div class="user-name" id="currentUserName">...</div>
            <div style="font-size: 12px; color: #8e9eae;"><span class="online-dot"></span> Онлайн</div>
        </div>
        
        <div>
            <div style="color:#8e9eae; margin-bottom: 8px;"><i class="fas fa-qrcode"></i> ВАШ ID</div>
            <div class="id-box" id="myIdDisplay">Генерация...</div>
            <button class="btn btn-secondary" id="copyIdBtn" style="margin-top: 8px;"><i class="fas fa-copy"></i> Копировать ID</button>
        </div>
        
        <div>
            <div style="color:#8e9eae; margin-bottom: 8px;"><i class="fas fa-user-plus"></i> ПОДКЛЮЧИТЬСЯ</div>
            <input type="text" class="input-field" id="remoteIdInput" placeholder="Введите ID друга">
            <button class="btn" id="connectBtn"><i class="fas fa-plug"></i> Подключиться</button>
            <div id="connectionStatus" class="status disconnected">⚫ Не подключен</div>
        </div>
        
        <div class="help-text">
            <i class="fas fa-phone-alt"></i> Голосовые звонки:<br>
            • Подключитесь к другу<br>
            • Нажмите 📞 для звонка<br>
            • Друг принимает вызов<br>
            • Говорите в микрофон! 🎤
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">
            <h3><i class="fas fa-comments"></i> <span id="connectedUserName">Никто не подключен</span></h3>
            <div class="call-buttons">
                <button class="call-btn" id="voiceCallBtn" title="Голосовой звонок"><i class="fas fa-phone-alt"></i></button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align:center; color:#6c8695; padding:40px;">
                <i class="fas fa-comment-dots" style="font-size: 48px; opacity: 0.5;"></i><br>
                Скопируйте свой ID и отправьте другу
            </div>
        </div>
        <div class="input-area">
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение...">
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            <div class="tools">
                <button id="stickerBtn"><i class="fas fa-smile"></i></button>
                <button id="giftBtn"><i class="fas fa-gift"></i></button>
            </div>
            <div id="stickerPanel" class="sticker-panel hidden">
                <div class="sticker">😀</div><div class="sticker">😂</div><div class="sticker">🥰</div>
                <div class="sticker">😎</div><div class="sticker">🔥</div><div class="sticker">🎉</div>
                <div class="sticker">❤️</div><div class="sticker">💪</div><div class="sticker">🤣</div>
                <div class="sticker">😍</div><div class="sticker">👍</div><div class="sticker">🎊</div>
                <div class="sticker">🚀</div><div class="sticker">✨</div><div class="sticker">💎</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== МЕССЕНДЖЕР С ГОЛОСОВЫМИ ЗВОНКАМИ ==========
    let peer = null;
    let currentConn = null;
    let currentCall = null;
    let localStream = null;
    let remoteStream = null;
    let isConnected = false;
    let remotePeerId = null;
    let myId = null;
    let isInCall = false;
    
    // Генерация уникального ID
    myId = 'user_' + Math.random().toString(36).substring(2, 12) + '_' + Date.now().toString(36);
    document.getElementById('myIdDisplay').innerText = myId;
    document.getElementById('currentUserName').innerText = myId.substring(0, 12);
    
    // Инициализация PeerJS с STUN серверами
    function initPeer() {
        peer = new Peer(myId, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                    { urls: 'stun:stun4.l.google.com:19302' }
                ]
            }
        });
        
        peer.on('open', (id) => {
            addSystemMessage('✅ Ваш ID готов! Отправьте его другу.');
        });
        
        peer.on('error', (err) => {
            console.error(err);
            if (err.type === 'network') {
                addSystemMessage('⚠️ Ошибка сети. Попробуйте обновить страницу (F5)');
            }
        });
        
        peer.on('connection', (conn) => {
            if (currentConn) { conn.close(); return; }
            setupConnection(conn);
            addSystemMessage(`📞 Входящее подключение!`);
        });
        
        peer.on('call', (call) => {
            if (currentCall) { 
                call.close(); 
                return; 
            }
            
            const acceptCall = confirm(`📞 Входящий голосовой звонок! Принять?`);
            if (acceptCall) {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        localStream = stream;
                        call.answer(stream);
                        setupVoiceCall(call);
                        addSystemMessage('🎙️ Звонок начат. Говорите!');
                        updateCallUI(true);
                    })
                    .catch(() => {
                        addSystemMessage('❌ Не удалось получить доступ к микрофону');
                        call.close();
                    });
            } else {
                call.close();
                addSystemMessage('📞 Звонок отклонён');
            }
        });
    }
    
    function setupConnection(conn) {
        currentConn = conn;
        remotePeerId = conn.peer;
        isConnected = true;
        
        document.getElementById('connectionStatus').className = 'status connected';
        document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-link"></i> Подключен!';
        document.getElementById('connectedUserName').innerHTML = '<i class="fas fa-user-circle"></i> Собеседник';
        
        conn.on('data', (data) => {
            if (data.type === 'message') {
                addMessageToChat(data.text, 'incoming', data.time);
            } else if (data.type === 'sticker') {
                addMessageToChat(data.sticker, 'incoming', data.time, true);
            } else if (data.type === 'gift') {
                addMessageToChat('🎁 Подарок от друга!', 'incoming', data.time);
            } else if (data.type === 'call_end') {
                endCall();
                addSystemMessage('📞 Собеседник завершил звонок');
            }
        });
        
        conn.on('close', () => {
            disconnectChat();
            addSystemMessage('🔌 Собеседник отключился');
        });
        
        addSystemMessage('✅ Подключение установлено! Можете общаться и звонить.');
    }
    
    function connectToFriend() {
        const targetId = document.getElementById('remoteIdInput').value.trim();
        if (!targetId) { alert('Введите ID друга'); return; }
        if (targetId === myId) { alert('Нельзя подключиться к самому себе!'); return; }
        if (currentConn) currentConn.close();
        
        addSystemMessage(`🔍 Подключение к ${targetId.substring(0, 12)}...`);
        const conn = peer.connect(targetId);
        
        conn.on('open', () => {
            setupConnection(conn);
        });
        
        conn.on('error', () => {
            alert('Не удалось подключиться. Проверьте ID друга и что он онлайн.');
            addSystemMessage('❌ Ошибка подключения');
        });
        
        setTimeout(() => {
            if (!isConnected) {
                addSystemMessage('⚠️ Не удалось подключиться. Убедитесь, что друг онлайн.');
            }
        }, 8000);
    }
    
    function makeVoiceCall() {
        if (!isConnected) {
            alert('Сначала подключитесь к другу!');
            return;
        }
        
        if (isInCall) {
            endCall();
            return;
        }
        
        addSystemMessage('📞 Звонок... Ожидаем ответа...');
        document.getElementById('connectionStatus').className = 'status calling';
        document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-phone-alt"></i> Звоним...';
        
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                localStream = stream;
                const call = peer.call(remotePeerId, stream);
                setupVoiceCall(call);
                updateCallUI(true);
            })
            .catch(() => {
                addSystemMessage('❌ Нет доступа к микрофону. Разрешите доступ в браузере.');
                document.getElementById('connectionStatus').className = 'status connected';
                document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-link"></i> Подключен';
            });
    }
    
    function setupVoiceCall(call) {
        currentCall = call;
        isInCall = true;
        
        call.on('stream', (stream) => {
            remoteStream = stream;
            addSystemMessage('🎙️ Звонок активен! Говорите в микрофон.');
            document.getElementById('connectionStatus').className = 'status connected';
            document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-phone-alt"></i> В звонке 🎤';
            
            // Создаем аудио элемент для воспроизведения звука собеседника
            const audioElement = new Audio();
            audioElement.srcObject = stream;
            audioElement.autoplay = true;
            call.audioElement = audioElement;
        });
        
        call.on('close', () => {
            endCall();
            addSystemMessage('📞 Звонок завершён');
        });
        
        call.on('error', () => {
            endCall();
            addSystemMessage('❌ Ошибка соединения во время звонка');
        });
    }
    
    function endCall() {
        if (currentCall) {
            if (currentCall.audioElement) {
                currentCall.audioElement.pause();
                currentCall.audioElement.srcObject = null;
            }
            currentCall.close();
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        localStream = null;
        remoteStream = null;
        currentCall = null;
        isInCall = false;
        
        updateCallUI(false);
        
        if (isConnected && currentConn) {
            currentConn.send({ type: 'call_end' });
        }
        
        if (isConnected) {
            document.getElementById('connectionStatus').className = 'status connected';
            document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-link"></i> Подключен';
        } else {
            document.getElementById('connectionStatus').className = 'status disconnected';
            document.getElementById('connectionStatus').innerHTML = '⚫ Не подключен';
        }
    }
    
    function updateCallUI(inCall) {
        const callBtn = document.getElementById('voiceCallBtn');
        if (inCall) {
            callBtn.classList.add('active');
            callBtn.innerHTML = '<i class="fas fa-phone-slash"></i>';
            callBtn.title = 'Завершить звонок';
        } else {
            callBtn.classList.remove('active');
            callBtn.innerHTML = '<i class="fas fa-phone-alt"></i>';
            callBtn.title = 'Голосовой звонок';
        }
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !isConnected) {
            if (!isConnected) addSystemMessage('⚠️ Сначала подключитесь к другу');
            return;
        }
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        addMessageToChat(text, 'outgoing', time);
        currentConn.send({ type: 'message', text: text, time: time });
        input.value = '';
    }
    
    function sendSticker(emoji) {
        if (!isConnected) { addSystemMessage('⚠️ Сначала подключитесь к другу'); return; }
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        addMessageToChat(emoji, 'outgoing', time, true);
        currentConn.send({ type: 'sticker', sticker: emoji, time: time });
    }
    
    function sendGift() {
        if (!isConnected) { addSystemMessage('⚠️ Сначала подключитесь к другу'); return; }
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        addMessageToChat('🎁 Отправил(а) подарок!', 'outgoing', time);
        currentConn.send({ type: 'gift', time: time });
    }
    
    function addMessageToChat(content, type, time, isSticker = false) {
        const container = document.getElementById('messagesArea');
        
        if (container.children.length === 1 && container.children[0].innerText.includes('Скопируйте свой ID')) {
            container.innerHTML = '';
        }
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type === 'outgoing' ? 'outgoing' : 'incoming'}`;
        let displayContent = isSticker && content.length <= 4 ? `<div style="font-size: 42px;">${content}</div>` : escapeHtml(content);
        msgDiv.innerHTML = `<div><div class="bubble">${displayContent}</div><div class="message-time">${time}</div></div>`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    function addSystemMessage(text) {
        const container = document.getElementById('messagesArea');
        
        if (container.children.length === 1 && container.children[0].innerText.includes('Скопируйте свой ID')) {
            container.innerHTML = '';
        }
        
        const msgDiv = document.createElement('div');
        msgDiv.className = 'call-message';
        msgDiv.innerHTML = `<i class="fas fa-info-circle"></i> ${escapeHtml(text)}`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    function disconnectChat() {
        if (isInCall) endCall();
        isConnected = false;
        if (currentConn) currentConn.close();
        currentConn = null;
        remotePeerId = null;
        document.getElementById('connectionStatus').className = 'status disconnected';
        document.getElementById('connectionStatus').innerHTML = '⚫ Не подключен';
        document.getElementById('connectedUserName').innerHTML = 'Никто не подключен';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    // Обработчики
    document.getElementById('copyIdBtn').onclick = () => {
        navigator.clipboard.writeText(myId);
        alert('✅ ID скопирован! Отправьте его другу.');
    };
    document.getElementById('connectBtn').onclick = connectToFriend;
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    document.getElementById('voiceCallBtn').onclick = makeVoiceCall;
    document.getElementById('stickerBtn').onclick = () => document.getElementById('stickerPanel').classList.toggle('hidden');
    document.getElementById('giftBtn').onclick = sendGift;
    
    document.querySelectorAll('.sticker').forEach(s => {
        s.onclick = () => {
            sendSticker(s.innerText);
            document.getElementById('stickerPanel').classList.add('hidden');
        };
    });
    
    // Запуск
    initPeer();
    addSystemMessage('🌟 Добро пожаловать! Ваш ID сгенерирован автоматически.');
    addSystemMessage('📋 Скопируйте ID и отправьте другу для общения.');
    addSystemMessage('📞 После подключения нажмите на иконку телефона для звонка!');
</script>
</body>
</html>
